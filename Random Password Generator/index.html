<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Generate a <br><span>Random password</span></h1>
        <div class="display">
            <input type="text" id="password" placeholder="password">
            <img src="images/copy.png" alt="" onclick="copyPassword()">
        </div>
        <button onclick="createPassword()">Generate Password</button>
    </div>

    <script>
        const passwordBox = document.getElementById("password");
        const length = 12; // Set to a higher value for more secure passwords

        const upperCase = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerCase = "abcdefghijklmnopqrstuvwxyz";
        const number = "0123456789";
        const symbol = "@#$%^&*()<>?+_~|";

        const allChars = upperCase + lowerCase + number + symbol;

        function createPassword() {
            let password = "";

            // Ensure each type of character is included
            password += upperCase[Math.floor(Math.random() * upperCase.length)];
            password += lowerCase[Math.floor(Math.random() * lowerCase.length)];
            password += number[Math.floor(Math.random() * number.length)];
            password += symbol[Math.floor(Math.random() * symbol.length)];

            // Randomly add characters until the desired length is reached
            while (password.length < length) {
                password += allChars[Math.floor(Math.random() * allChars.length)];
            }

            passwordBox.value = password; // Display the generated password in the input box
        }

        function copyPassword() {
            passwordBox.select();
            document.execCommand("copy"); // Copy password to clipboard
        }
    </script>
</body>
</html>
